<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>RAN Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<!-- START -->
<div class="card center" id="start">
  <h1>
    No estás tomando malas decisiones…<br>
    <span>estás decidiendo en mal estado.</span>
  </h1>

  <p class="sub">
    Este test detecta tu estado cognitivo actual en 2 minutos.
  </p>

  <button class="cta" onclick="startTest()">
    Detectar mi estado →
  </button>
</div>

<!-- QUIZ -->
<div class="card hidden" id="quiz">
  <div class="top">
    <div class="progress">
      <div id="bar"></div>
    </div>
    <span id="step"></span>
  </div>

  <h2 id="question"></h2>

  <div class="options">
    <button onclick="answer(1)">1<span>Muy bajo</span></button>
    <button onclick="answer(2)">2<span>Bajo</span></button>
    <button onclick="answer(3)">3<span>Normal</span></button>
    <button onclick="answer(4)">4<span>Alto</span></button>
    <button onclick="answer(5)">5<span>Muy alto</span></button>
  </div>
</div>

<!-- RESULT -->
<div class="card hidden center" id="result">
  <p class="mini">TU ESTADO ACTUAL</p>

  <h1 id="resultText"></h1>

  <div class="scoreBox">
    <span id="score"></span>
  </div>

  <p id="desc"></p>

  <div class="ctaGroup">
    <button class="cta big">Aprender Método RAN</button>
    <button class="ghost" onclick="location.reload()">Repetir</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
